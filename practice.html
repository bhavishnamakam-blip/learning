<!Doctype html>
<html lang="en">
    <head>
        <title> My practicepage</title>
        <style>
            .button-amazon{
                background-color:rgb(230, 178, 56);
                color: black;
                height: 50px;
                width: 200px;
                border-radius: 50px;
                font-size: 20px;
                border: none;
                cursor: pointer;
            }
            .button-amazon:hover{
                background-color: rgb(224, 162, 37);
            }
            .button-amazon:active{
               opacity: 0.6;
            }
            .button-buy{
                background-color:rgb(35, 128, 210);
                color: white;
                height: 50px;
                width: 100px;
                border-radius: 50px;
                font-size: 20px;
                border: none;
                cursor: pointer;
            }
            .search-bar{
                width: 300px;
                height: 40px;
                border-radius: 20px;
                border: 1px solid black;
                font-size: 20px;
                padding: 10px;
                border:none;
            }

            .search-bargoogle{
                width: 500px;
                height: 30px;
                border-radius: 40px;
                border: 1px solid black;
                font-size: 20px;
                padding:20px;
                border:none;
                box-shadow: 0px 0px 5px 1px rgba(0,0,0,0.5);
                margin:20px;
            }

            .search-baremail{
                border:1px solid black;
                border-radius: 10px;
                height: 30px;
                width: 300px;

            }

            .button-pickup{
                background-color:rgb(5, 5, 5);
                color: white;
                 padding: 10px;
                 height:60px;
                 width:200px;
                 border:none
                 display: inline-block;
            
            }

            .button-destiny{
                background-color:rgba(193, 178, 178, 0.5);
                color: black;
                padding: 10px;
                height:60px;
                width:200px;
                border:none;
                display: inline-block;
            }
            .button-container{
                display:flex;
                gap: 20px;
                margin-top: 20px;
            }
            .google-tabs{
                display: flex;
                gap: 20px;
                justify-content: center;
                font-size: 16px;
                font-family: Lucida Sans;
                font-weight: lighter;
            }
            .yes-no-buttons{
                display:inline-block;
                gap: 20px;

            }
            .dog-img{
                height: 70px;
                width: 70px;
                display: inline-block;
              border-radius : 50px;
                margin-top: 50px;
                margin-left: 50px;
            }
            .dog-text{
                display: inline-block;
                font-size: 20px;
                font-family: Arial;
                color: rgb(74, 74, 131);
                margin-left: 20px;
                vertical-align: middle;
                margin-bottom: 80px;
            }
            .dog-button{
                background-color: rgb(34, 146, 232);
                color: white;
                border: none;
                padding: 20px;
                cursor: pointer;
                border-radius: 40px;
                width: 130px;
                display: inline-block;
                font-size: 22px;
                margin-left: 300px;
                margin-top: 50px;
            }




        </style>
    </head>
    <body>
        <button class="button-amazon"> Add to Cart </button>

        <div  style="text-align: center;margin-bottom: 0;"> 
         <h2 style="color:rgb(232, 162, 70)"> New </h2>
         <h1 style="color:rgb(65, 64, 62);font-size: 30px;font-family: Arial;"> MacBook Pro </h1>
         <h3 style="color:rgb(65, 64, 62);font-size: 50px;font-family: Arial;"> Supercharged for pros. </h3>
         <p style="font-family: Arial;"> From $1999 </p>
         <button class="button-buy" > Buy </button>
         </div> 
      
         <input class="search-bar" type="text" placeholder="Search"> 

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1280px-Google_2015_logo.svg.png" style="height: 70px;width: 200px;margin-left: 550px;">
    
         <input class="search-bargoogle" type="text" placeholder="Search Google or type a URL" style="margin-left: 330px;"> 

        <div class="google-tabs">
        <h1 style="vertical-align: top;"> Google search </h1>
        <h2> I'm feeling lucky </h2>
        </div>

        <h style="font-size: 20px;font-family:Arial"> Email </h>

         <input  class="search-baremail"type="email">
         
         <p>  Here's something brand new!</p>
     
    
         <p style="font-weight: bold;"> Thanks for chatting with our <br> customer support! Would you <br> like to take our quick survey?<br> </p>
         <div style="float:left; width:200px; margin-right:15px;">
         <button class="yes-no-buttons" > Yes </button> 
         <button class="yes-no-buttons" > No </button>
         </div>
   
    
    <pre>
    <h1 style="font-family:Arial;">  Request a ride now </h1>
    <input placeholder="Enter pickup location" type="text" style="padding: 20px;height:2px;width: 500px;border:none;background-color:rgb(199, 202, 200)">
    <input placeholder="Enter destination" type="text" style="padding: 20px;height:2px;width: 500px;margin-top: 20px;border:none;background-color:rgb(199, 202, 200)">

<div class="button-container"> 
    <button class="button-pickup"> Request now </button>

    <button class="button-destiny"> Schedule for later </button>
    </pre>
</div>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRpWpZMAYoSMpQTMoSmYBSJt72b-TJfVgYEA&s" class="dog-img">
<p class="dog-text"> My name is Bruno! </p>
<button class="dog-button"> Tweet </button>
    </body>
</html>
